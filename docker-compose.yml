services:
  books_container:
    image: qdrant/qdrant:latest
    container_name: books_container
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - books_qdrant_storage:/qdrant/storage

  book_query_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book_query_api
    restart: unless-stopped
    depends_on:
      - books_container
    ports:
      - "8001:8000"
    environment:
      BOOK_QUERY_API_KEY: change-me
      QDRANT_URL: ${QDRANT_URL:-http://books_container:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-books_collection}
      EMBEDDING_PROVIDER: ollama
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_EMBED_DIMENSIONS: "768"
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      EMBEDDING_DEVICE: cpu

volumes:
  books_qdrant_storage:
